<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeAutonom — Arbitrage Dashboard</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232733;--border:#2e3345;--text:#e1e4ed;--dim:#8b8fa3;--accent:#6366f1;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:17px;font-weight:600}
header h1 span{color:var(--accent)}
.hdr-right{display:flex;align-items:center;gap:8px}
.badge{background:var(--surface2);border:1px solid var(--border);padding:3px 10px;border-radius:10px;font-size:11px;color:var(--dim)}

/* Tab bar */
.tab-bar{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;gap:0;overflow-x:auto}
.tab{display:flex;align-items:center;gap:6px;padding:10px 16px;font-size:12px;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .tab-status{width:6px;height:6px;border-radius:50%;display:inline-block}
.tab .tab-status.idle{background:var(--dim)}
.tab .tab-status.monitoring{background:var(--blue)}
.tab .tab-status.holding{background:var(--green)}
.tab .tab-status.awaiting_exit{background:var(--yellow)}
.tab .tab-status.exited{background:var(--dim)}
.tab .tab-close{font-size:14px;color:var(--dim);margin-left:4px;cursor:pointer;line-height:1}
.tab .tab-close:hover{color:var(--red)}
.tab-add{padding:10px 14px;font-size:16px;color:var(--dim);cursor:pointer;font-weight:700}
.tab-add:hover{color:var(--green)}

.container{max-width:1200px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--dim);margin-bottom:14px}
.full{grid-column:1/-1}
.job-panel{display:none}
.job-panel.active{display:block}

.spread-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;margin-bottom:16px}
.pb{text-align:center}
.pb .lbl{font-size:11px;color:var(--dim);margin-bottom:2px}
.pb .pr{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}
.pb .inst{font-size:10px;color:var(--dim);margin-top:1px}
.sc{text-align:center;padding:10px 18px;background:var(--surface2);border-radius:8px;min-width:130px}
.sc .sv{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums}
.sc .sl{font-size:10px;color:var(--dim);margin-top:1px}

.sig{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px;border-radius:6px;font-size:12px;font-weight:600}
.sig.entry{background:rgba(34,197,94,.1);color:var(--green)}
.sig.exit{background:rgba(239,68,68,.1);color:var(--red)}
.sig.none{background:rgba(139,143,163,.1);color:var(--dim)}
.sig .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.sig.entry .dot{background:var(--green)}
.sig.exit .dot{background:var(--red)}
.sig.none .dot{background:var(--dim)}

.hist{display:flex;align-items:flex-end;gap:2px;height:50px;margin-top:10px}
.hbar{flex:1;min-width:3px;border-radius:2px 2px 0 0;transition:height .3s}
.ri{font-size:10px;color:var(--dim);text-align:center;margin-top:6px}
.ri span{color:var(--accent)}

.at{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface2);border-radius:8px;margin-bottom:14px}
.at .lg h3{font-size:13px;font-weight:600}
.at .lg p{font-size:11px;color:var(--dim);margin-top:1px}
.tg{position:relative;width:44px;height:24px}
.tg input{opacity:0;width:0;height:0}
.tgs{position:absolute;inset:0;background:var(--border);border-radius:24px;cursor:pointer;transition:.3s}
.tgs::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s}
.tg input:checked+.tgs{background:var(--green)}
.tg input:checked+.tgs::before{transform:translateX(20px)}

.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
.fld input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:5px;font-size:13px;font-variant-numeric:tabular-nums;outline:none;transition:border-color .2s}
.fld input:focus{border-color:var(--accent)}
.fld select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:5px;font-size:13px;outline:none;transition:border-color .2s;width:100%}
.fld select:focus{border-color:var(--accent)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.bp{background:var(--accent);color:#fff}.bp:hover{opacity:.9}
.bs{background:var(--green);color:#fff}.bs:hover{opacity:.9}
.bd{background:var(--red);color:#fff}.bd:hover{opacity:.9}
.bo{background:transparent;border:1px solid var(--border);color:var(--dim)}.bo:hover{border-color:var(--dim);color:var(--text)}
.br{display:flex;gap:6px;margin-top:14px}

.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.st{background:var(--surface2);padding:10px;border-radius:6px;text-align:center}
.st .stl{font-size:10px;color:var(--dim);margin-bottom:3px}
.st .stv{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
th{text-align:left;padding:6px 8px;color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
td{padding:6px 8px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
.long{color:var(--green)}.short{color:var(--red)}
.pp{color:var(--green)}.pn{color:var(--red)}
.empty{text-align:center;padding:20px;color:var(--dim);font-size:12px}

.lc{max-height:260px;overflow-y:auto;font-size:11px;font-family:'SF Mono','Fira Code',monospace}
.le{padding:5px 8px;border-bottom:1px solid var(--border);display:flex;gap:8px}
.le .lt{color:var(--dim);white-space:nowrap}
.le.success{border-left:3px solid var(--green)}
.le.error{border-left:3px solid var(--red)}
.le.info{border-left:3px solid var(--blue)}
.le.warn{border-left:3px solid var(--yellow)}
.lev-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.lev-row .lev-inst{font-size:12px;min-width:130px}
.lev-row select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:12px;outline:none}
.lev-row select:focus{border-color:var(--accent)}
.lev-row .lev-cur{font-size:11px;color:var(--dim);min-width:50px}
.pos-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 12px;border-radius:6px;font-size:12px;margin-top:8px}
.pos-bar.open{background:rgba(99,102,241,.12);color:var(--accent);border:1px solid rgba(99,102,241,.25)}
.pos-bar.flat{background:var(--surface2);color:var(--dim)}
.pos-bar .pos-tag{font-weight:700;font-size:11px;padding:2px 8px;border-radius:4px}
.pos-bar .pos-tag.long{background:rgba(34,197,94,.15);color:var(--green)}
.pos-bar .pos-tag.short{background:rgba(239,68,68,.15);color:var(--red)}

.ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ob-panel{background:var(--surface2);border-radius:8px;padding:12px;overflow:hidden}
.ob-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ob-header .ob-title{font-size:12px;font-weight:700}
.ob-header .ob-src{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.ob-header .ob-src.ws{background:rgba(34,197,94,.15);color:var(--green)}
.ob-header .ob-src.rest{background:rgba(139,143,163,.15);color:var(--dim)}
.ob-ladder{display:grid;grid-template-columns:1fr 1fr;gap:0}
.ob-side{min-width:0}
.ob-side-hdr{font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:var(--dim);padding:4px 6px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;text-align:right}
.ob-side-hdr span:first-child{text-align:left}
.ob-row{display:grid;grid-template-columns:1fr 1fr;padding:2px 6px;font-size:11px;font-variant-numeric:tabular-nums;position:relative}
.ob-row .ob-price{text-align:left}.ob-row .ob-size{text-align:right;color:var(--dim)}
.ob-row .ob-bar{position:absolute;top:0;bottom:0;opacity:.12;border-radius:2px}
.ob-bids .ob-row .ob-bar{right:0;background:var(--green)}
.ob-bids .ob-row .ob-price{color:var(--green)}
.ob-asks .ob-row .ob-bar{right:0;background:var(--red)}
.ob-asks .ob-row .ob-price{color:var(--red)}
.ob-spread-row{text-align:center;padding:4px 0;font-size:10px;color:var(--dim);border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-weight:600}

/* Spread stream chart */
.spread-chart{height:80px;display:flex;align-items:flex-end;gap:1px;background:var(--surface2);border-radius:6px;padding:6px;overflow:hidden}
.spread-chart .sc-bar{flex:1;min-width:1px;border-radius:1px 1px 0 0;transition:height .2s}
.stream-info{font-size:10px;color:var(--dim);margin-top:4px;display:flex;justify-content:space-between}

/* Trade log table */
.tlog{width:100%;border-collapse:collapse;font-size:11px}
.tlog th{text-align:left;padding:6px 8px;color:var(--dim);font-size:9px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border)}
.tlog td{padding:5px 8px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
.tlog .fill-price{color:var(--accent);font-weight:600}
.tlog .act-entry{color:var(--green)}.tlog .act-exit{color:var(--red)}
.tlog .ok{color:var(--green)}.tlog .fail{color:var(--red)}

/* New job modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:460px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:16px;margin-bottom:16px}
.modal .cg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<header>
  <h1><span>TradeAutonom</span> Arbitrage Dashboard</h1>
  <div class="hdr-right">
    <div class="badge" id="envBadge">connecting...</div>
    <div class="badge" id="wsBadge" style="display:none;font-weight:600">WS</div>
  </div>
</header>

<!-- Tab bar -->
<div class="tab-bar" id="tabBar">
  <div class="tab-add" onclick="showNewJobModal()" title="Add new job">+</div>
</div>

<!-- Job panels rendered dynamically -->
<div id="jobPanels"></div>

<!-- New Job Modal -->
<div class="modal-overlay" id="newJobModal">
  <div class="modal">
    <h2>New Arbitrage Job</h2>
    <div class="cg">
      <div class="fld"><label>Job ID (optional)</label><input type="text" id="njId" placeholder="auto"></div>
      <div class="fld"><label>Name (optional)</label><input type="text" id="njName" placeholder="auto"></div>
      <div class="fld"><label>Leg A Exchange</label><select id="njExA" onchange="loadMarkets('njExA','njInstA')"><option value="extended">Extended</option><option value="grvt">GRVT</option></select></div>
      <div class="fld"><label>Leg A Instrument</label><select id="njInstA"><option value="">Loading...</option></select></div>
      <div class="fld"><label>Leg B Exchange</label><select id="njExB" onchange="loadMarkets('njExB','njInstB')"><option value="grvt">GRVT</option><option value="extended">Extended</option></select></div>
      <div class="fld"><label>Leg B Instrument</label><select id="njInstB"><option value="">Loading...</option></select></div>
      <div class="fld"><label>Entry Min Spread ($)</label><input type="number" id="njES" value="0.08" step="0.01"></div>
      <div class="fld"><label>Exit Max Spread ($)</label><input type="number" id="njXS" value="0.02" step="0.01"></div>
      <div class="fld"><label>Quantity</label><input type="number" id="njQ" value="0.1" step="0.001"></div>
      <div class="fld"><label>Simulation</label><select id="njSim"><option value="false">Off</option><option value="true">On</option></select></div>
      <div class="fld"><label>Hold Duration (h)</label><input type="number" id="njHD" value="" step="0.5" placeholder="no limit"></div>
      <div class="fld"><label>Sched. Exit Max Spread ($)</label><input type="number" id="njMES" value="0.02" step="0.01"></div>
      <div class="fld"><label>Auto-Trade</label><select id="njAT"><option value="false">Off</option><option value="true">On</option></select></div>
    </div>
    <div class="br">
      <button class="btn bs" onclick="createJob()">Create Job</button>
      <button class="btn bo" onclick="hideNewJobModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API=location.origin;
let rInt=null,rMs=3000,activeJobId=null;
const jobState={};  // {jobId: {sHist:[], sseSource:null, logs:[]}}

function $(id){return document.getElementById(id)}
async function f(p,o={}){try{const r=await fetch(API+p,{headers:{'Content-Type':'application/json'},...o});return await r.json()}catch(e){return null}}
function fmtP(p){return typeof p==='number'?p.toFixed(4):parseFloat(p).toFixed(4)}
function fmtS(s){const v=typeof s==='number'?s:parseFloat(s);return v>=1?v.toFixed(2):v>=0.01?v.toFixed(4):v.toFixed(6)}

// ---- Markets cache ----
const _marketsCache={};
async function fetchMarkets(exchange){
  if(_marketsCache[exchange])return _marketsCache[exchange];
  const d=await f('/exchanges/markets?exchange='+encodeURIComponent(exchange));
  if(d&&d.markets){
    const syms=d.markets.map(m=>m.symbol).sort();
    _marketsCache[exchange]=syms;
    return syms;
  }
  return [];
}
async function loadMarkets(exSelId,instSelId){
  const ex=$(exSelId).value;
  const sel=$(instSelId);
  sel.innerHTML='<option value="">Loading...</option>';
  const syms=await fetchMarkets(ex);
  sel.innerHTML='';
  if(!syms.length){sel.innerHTML='<option value="">No markets</option>';return}
  syms.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o)});
}

// ---- Modal ----
async function showNewJobModal(){
  $('newJobModal').classList.add('show');
  await Promise.all([loadMarkets('njExA','njInstA'),loadMarkets('njExB','njInstB')]);
}
function hideNewJobModal(){$('newJobModal').classList.remove('show')}

async function createJob(){
  const hd=parseFloat($('njHD').value);
  const b={
    job_id:$('njId').value||undefined,
    name:$('njName').value||undefined,
    instrument_a:$('njInstA').value,
    instrument_b:$('njInstB').value,
    leg_a_exchange:$('njExA').value,
    leg_b_exchange:$('njExB').value,
    spread_entry_low:parseFloat($('njES').value)||0.05,
    spread_exit_high:parseFloat($('njXS').value)||0.50,
    quantity:parseFloat($('njQ').value)||0.1,
    simulation_mode:$('njSim').value==='true',
    auto_trade:$('njAT').value==='true',
    hold_duration_h:isNaN(hd)?null:hd,
    min_exit_spread:parseFloat($('njMES').value)||0.05,
  };
  const r=await f('/jobs',{method:'POST',body:JSON.stringify(b)});
  if(r&&r.status==='ok'){hideNewJobModal();await refreshJobList();switchTab(r.job.job_id)}
  else alert('Failed: '+(r?r.detail||JSON.stringify(r):'no response'));
}

// ---- Job list + tabs ----
async function refreshJobList(){
  const d=await f('/jobs');if(!d)return;
  const bar=$('tabBar');
  // Keep the + button
  bar.innerHTML='';
  for(const j of d.jobs){
    const t=document.createElement('div');
    t.className='tab'+(j.job_id===activeJobId?' active':'');
    t.dataset.jobId=j.job_id;
    t.innerHTML='<span class="tab-status '+j.status+'"></span><span>'+j.name+'</span>'
      +(j.job_id!=='default'?'<span class="tab-close" onclick="event.stopPropagation();deleteJob(\''+j.job_id+'\')">&times;</span>':'');
    t.onclick=()=>switchTab(j.job_id);
    bar.appendChild(t);
    // Initialize state if needed
    if(!jobState[j.job_id])jobState[j.job_id]={sHist:[],sseSource:null,logs:[]};
  }
  const addBtn=document.createElement('div');
  addBtn.className='tab-add';addBtn.textContent='+';addBtn.onclick=showNewJobModal;addBtn.title='Add new job';
  bar.appendChild(addBtn);
  // Create panels
  const panels=$('jobPanels');
  // Remove panels for deleted jobs
  panels.querySelectorAll('.job-panel').forEach(p=>{
    if(!d.jobs.find(j=>j.job_id===p.dataset.jobId))p.remove();
  });
  for(const j of d.jobs){
    if(!document.querySelector('.job-panel[data-job-id="'+j.job_id+'"]')){
      const panel=document.createElement('div');
      panel.className='job-panel';panel.dataset.jobId=j.job_id;
      panel.innerHTML=buildJobHTML(j.job_id);
      panels.appendChild(panel);
    }
  }
  // Auto-select first tab if none active
  if(!activeJobId&&d.jobs.length)switchTab(d.jobs[0].job_id);
  // Update env badge
  const ws=await f('/ws/status');
  const wsb=$('wsBadge');
  if(ws&&ws.enabled){wsb.style.display='inline-block';wsb.style.background='var(--green)';wsb.style.color='#000';wsb.textContent='WS LIVE'}
  else{wsb.style.display='none'}
  $('envBadge').textContent=d.jobs.length+' job'+(d.jobs.length!==1?'s':'');
}

function switchTab(jobId){
  activeJobId=jobId;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.jobId===jobId));
  document.querySelectorAll('.job-panel').forEach(p=>{p.classList.toggle('active',p.dataset.jobId===jobId)});
  // Start SSE for this job
  startSSE(jobId);
  // Refresh immediately
  tickJob(jobId);
}

async function deleteJob(jobId){
  if(!confirm('Delete job '+jobId+'?'))return;
  await f('/jobs/'+jobId,{method:'DELETE'});
  if(jobState[jobId]&&jobState[jobId].sseSource){jobState[jobId].sseSource.close();delete jobState[jobId]}
  const panel=document.querySelector('.job-panel[data-job-id="'+jobId+'"]');
  if(panel)panel.remove();
  if(activeJobId===jobId)activeJobId=null;
  await refreshJobList();
}

// ---- Build per-job HTML ----
function buildJobHTML(jid){
  const p=jid.replace(/[^a-zA-Z0-9]/g,'_');
  return `<div class="container">
  <div class="card full">
    <div class="card-title">Live Spread Monitor <span class="badge" id="jStatus_${p}" style="margin-left:8px"></span></div>
    <div class="spread-row">
      <div class="pb"><div class="lbl" id="jLblB_${p}">LEG B</div><div class="pr" id="jPrB_${p}">—</div><div class="inst"><span id="jIB_${p}">—</span> <span id="jExB_${p}" style="color:var(--accent);font-size:9px"></span></div></div>
      <div class="sc"><div class="sv" id="jSVexec_${p}">—</div><div class="sl">EXEC SPREAD</div><div class="sv" id="jSV_${p}" style="font-size:14px;color:var(--dim);margin-top:4px">—</div><div class="sl" style="font-size:9px">MID SPREAD</div></div>
      <div class="pb"><div class="lbl" id="jLblA_${p}">LEG A</div><div class="pr" id="jPrA_${p}">—</div><div class="inst"><span id="jIA_${p}">—</span> <span id="jExA_${p}" style="color:var(--accent);font-size:9px"></span></div></div>
    </div>
    <div class="sig none" id="jSig_${p}"><span class="dot"></span><span id="jSigTxt_${p}">Waiting...</span></div>
    <div class="pos-bar flat" id="jPos_${p}">No position</div>
    <div class="spread-chart" id="jChart_${p}"></div>
    <div class="stream-info"><span id="jSrc_${p}">Source: —</span><span id="jLu_${p}">Last: —</span></div>
  </div>
  <div class="card full">
    <div class="card-title">Live Order Books</div>
    <div class="ob-grid">
      <div class="ob-panel">
        <div class="ob-header"><span class="ob-title" id="jObTA_${p}">LEG A</span><span class="ob-src" id="jObSA_${p}">—</span></div>
        <div class="ob-ladder">
          <div class="ob-side ob-bids" id="jObBidsA_${p}"><div class="ob-side-hdr"><span>BID</span><span>SIZE</span></div></div>
          <div class="ob-side ob-asks" id="jObAsksA_${p}"><div class="ob-side-hdr"><span>ASK</span><span>SIZE</span></div></div>
        </div>
        <div class="ob-spread-row" id="jObSpA_${p}">—</div>
      </div>
      <div class="ob-panel">
        <div class="ob-header"><span class="ob-title" id="jObTB_${p}">LEG B</span><span class="ob-src" id="jObSB_${p}">—</span></div>
        <div class="ob-ladder">
          <div class="ob-side ob-bids" id="jObBidsB_${p}"><div class="ob-side-hdr"><span>BID</span><span>SIZE</span></div></div>
          <div class="ob-side ob-asks" id="jObAsksB_${p}"><div class="ob-side-hdr"><span>ASK</span><span>SIZE</span></div></div>
        </div>
        <div class="ob-spread-row" id="jObSpB_${p}">—</div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Configuration</div>
    <div class="at">
      <div class="lg"><h3>Auto-Trading</h3><p>Monitor &amp; execute via schedule</p></div>
      <label class="tg"><input type="checkbox" id="jAT_${p}" onchange="toggleJobAT('${jid}')"><span class="tgs"></span></label>
    </div>
    <div class="at" style="margin-top:8px;padding:8px 12px;background:rgba(255,193,7,0.08);border-radius:8px">
      <div class="lg"><h3 style="color:var(--yellow)">Simulation Mode</h3><p>Paper-trade: no real orders</p></div>
      <label class="tg"><input type="checkbox" id="jSim_${p}" onchange="toggleJobSim('${jid}')"><span class="tgs"></span></label>
    </div>
    <div style="margin:12px 0;padding:10px;background:var(--surface2);border-radius:8px">
      <div class="card-title" style="margin-bottom:8px">Schedule</div>
      <div class="cg">
        <div class="fld"><label>Hold Duration (h)</label><input type="number" id="jHD_${p}" step="0.5" placeholder="no limit"></div>
        <div class="fld"><label>Sched. Exit Max ($)</label><input type="number" id="jMES_${p}" step="0.01" title="Exit when spread converges below this (after hold duration)"></div>
      </div>
    </div>
    <div class="cg">
      <div class="fld"><label>Entry Min Spread ($)</label><input type="number" id="jES_${p}" step="0.01" title="Enter when spread diverges above this"></div>
      <div class="fld"><label>Exit Max Spread ($)</label><input type="number" id="jXS_${p}" step="0.01" title="Exit when spread converges below this"></div>
      <div class="fld"><label>Max Exec ($)</label><input type="number" id="jME_${p}" step="0.5"></div>
      <div class="fld"><label>Quantity</label><input type="number" id="jQ_${p}" step="0.001"></div>
      <div class="fld"><label>Order Type</label><select id="jOT_${p}"><option value="aggressive_limit">Aggressive Limit</option><option value="market">Market</option></select></div>
      <div class="fld"><label>Offset (ticks)</label><input type="number" id="jLOT_${p}" step="1" min="0"></div>
    </div>
    <div class="br">
      <button class="btn bp" onclick="saveJobCfg('${jid}')">Save Config</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Account &amp; Actions</div>
    <div id="jAcct_${p}"></div>
    <div class="br" style="margin-top:14px">
      <button class="btn bs" onclick="manualJobEntry('${jid}')">Manual Entry</button>
      <button class="btn bd" onclick="manualJobExit('${jid}')">Manual Exit</button>
    </div>
  </div>
  <div class="card full">
    <div class="card-title">Trade Log (Fill Prices)</div>
    <div id="jTLog_${p}" style="max-height:300px;overflow-y:auto"><div class="empty">No trades yet.</div></div>
  </div>
  <div class="card full">
    <div class="card-title">Event Log</div>
    <div class="lc" id="jLog_${p}"><div class="empty">—</div></div>
  </div>
</div>`;
}

// ---- SSE Spread Stream ----
function startSSE(jobId){
  // Close all other SSE connections
  for(const [id,st] of Object.entries(jobState)){
    if(st.sseSource&&id!==jobId){st.sseSource.close();st.sseSource=null}
  }
  const st=jobState[jobId];
  if(!st)return;
  if(st.sseSource)return;  // already connected
  const es=new EventSource(API+'/jobs/'+jobId+'/spread-stream?interval_ms=1000');
  es.onmessage=function(e){
    try{
      const d=JSON.parse(e.data);
      if(d.error)return;
      st.sHist.push(Math.abs(d.exec_spread));
      if(st.sHist.length>120)st.sHist.shift();
      renderChart(jobId);
    }catch(x){}
  };
  es.onerror=function(){es.close();st.sseSource=null;setTimeout(()=>{if(activeJobId===jobId)startSSE(jobId)},5000)};
  st.sseSource=es;
}

function renderChart(jobId){
  const st=jobState[jobId];if(!st)return;
  const p=jobId.replace(/[^a-zA-Z0-9]/g,'_');
  const el=$('jChart_'+p);if(!el)return;
  const hist=st.sHist,mx=Math.max(...hist,0.01);
  el.innerHTML=hist.map(v=>{
    const h=Math.max(1,(v/mx)*68);
    const co=v>0.1?'var(--green)':v<0.03?'var(--red)':'var(--yellow)';
    return '<div class="sc-bar" style="height:'+h+'px;background:'+co+'" title="$'+v.toFixed(4)+'"></div>';
  }).join('');
}

// ---- Per-job tick ----
async function tickJob(jobId){
  if(!jobId)return;
  const p=jobId.replace(/[^a-zA-Z0-9]/g,'_');
  // Check spread
  const d=await f('/jobs/'+jobId+'/check');
  if(d){
    const s=d.snapshot;
    const el=id=>$(id);
    if(s){
      el('jPrA_'+p).textContent='$'+s.mid_price_a.toFixed(2);
      el('jPrB_'+p).textContent='$'+s.mid_price_b.toFixed(2);
      el('jSVexec_'+p).textContent='$'+Math.abs(s.exec_spread||0).toFixed(4);
      el('jSV_'+p).textContent='$'+(s.spread||0).toFixed(4);
      el('jIA_'+p).textContent=s.instrument_a;el('jIB_'+p).textContent=s.instrument_b;
      el('jSrc_'+p).textContent='Source: '+(s.data_source||'rest').toUpperCase();
    }
    const sig=el('jSig_'+p),stxt=el('jSigTxt_'+p);
    sig.className='sig '+(d.action||'none').toLowerCase();
    stxt.textContent=d.reason||'Waiting for data...';
    el('jLu_'+p).textContent='Last: '+new Date().toLocaleTimeString();
  }
  // Status
  const st=await f('/jobs/'+jobId);
  if(st){
    const el=id=>$(id);
    el('jExA_'+p).textContent=st.leg_a_exchange;el('jExB_'+p).textContent=st.leg_b_exchange;
    // Store exchange names for trade log header
    if(!jobState[jobId])jobState[jobId]={sHist:[],sseSource:null};
    jobState[jobId].legAExchange=st.leg_a_exchange;jobState[jobId].legBExchange=st.leg_b_exchange;
    // Update LONG/SHORT labels based on current position or spread direction
    const exA=(st.leg_a_exchange||'LEG A').toUpperCase();
    const exB=(st.leg_b_exchange||'LEG B').toUpperCase();
    if(st.has_position&&st.long_sym&&st.short_sym){
      const aIsLong=st.long_sym===st.instrument_a;
      const lblAEl=el('jLblA_'+p),lblBEl=el('jLblB_'+p);
      if(lblAEl){lblAEl.textContent=exA+(aIsLong?' LONG':' SHORT');lblAEl.style.color=aIsLong?'var(--green)':'var(--red)'}
      if(lblBEl){lblBEl.textContent=exB+(aIsLong?' SHORT':' LONG');lblBEl.style.color=aIsLong?'var(--red)':'var(--green)'}
    }else{
      const lblAEl=el('jLblA_'+p),lblBEl=el('jLblB_'+p);
      if(lblAEl){lblAEl.textContent=exA;lblAEl.style.color=''}
      if(lblBEl){lblBEl.textContent=exB;lblBEl.style.color=''}
    }
    const ae=document.activeElement;
    const sf=id=>{const e=el(id);if(e&&e!==ae)return e;return null};
    const sv=(id,v)=>{const e=sf(id);if(e)e.value=v};
    const sc=(id,v)=>{const e=sf(id);if(e)e.checked=v};
    sv('jES_'+p,st.spread_entry_low);sv('jXS_'+p,st.spread_exit_high);
    sv('jME_'+p,st.max_exec_spread);sv('jQ_'+p,st.quantity);
    sv('jOT_'+p,st.order_type);sv('jLOT_'+p,st.limit_offset_ticks);
    sc('jAT_'+p,st.auto_trade);sc('jSim_'+p,st.simulation_mode);
    sv('jHD_'+p,st.hold_duration_h!=null?st.hold_duration_h:'');
    sv('jMES_'+p,st.min_exit_spread);
    // Status badge
    const sb=el('jStatus_'+p);
    sb.textContent=st.status.toUpperCase()+(st.simulation_mode?' [SIM]':'');
    sb.style.background=st.status==='holding'?'rgba(34,197,94,.15)':st.status==='awaiting_exit'?'rgba(234,179,8,.15)':'rgba(139,143,163,.1)';
    sb.style.color=st.status==='holding'?'var(--green)':st.status==='awaiting_exit'?'var(--yellow)':'var(--dim)';
    // Position bar
    const pb=el('jPos_'+p);
    if(st.has_position&&st.long_sym&&st.short_sym){
      pb.className='pos-bar open';
      let einfo=st.entry_spread_actual?' — Entry: $'+st.entry_spread_actual.toFixed(4):'';
      if(st.entry_time){const et=new Date(st.entry_time);const elapsed=((Date.now()-et.getTime())/3600000).toFixed(1);einfo+=' ('+elapsed+'h ago)'}
      pb.innerHTML='POSITION OPEN — <span class="pos-tag long">LONG '+st.long_sym+'</span> <span class="pos-tag short">SHORT '+st.short_sym+'</span>'+einfo;
    }else{pb.className='pos-bar flat';pb.textContent='No position'}
    // Update tab status dot
    const tab=document.querySelector('.tab[data-job-id="'+jobId+'"] .tab-status');
    if(tab)tab.className='tab-status '+st.status;
  }
  // Orderbooks
  const ob=await f('/jobs/'+jobId+'/orderbooks?depth=10');
  if(ob){renderJobOB(p,'A',ob.leg_a);renderJobOB(p,'B',ob.leg_b)}
  // Account
  const all=await f('/account/all');
  if(all){renderAcct(p,all)}
  // Trade log
  const tl=await f('/jobs/'+jobId+'/log?limit=20');
  if(tl)renderTradeLog(p,tl.entries||[],jobId);
}

function renderJobOB(p,leg,data){
  const bidsEl=$('jObBids'+leg+'_'+p),asksEl=$('jObAsks'+leg+'_'+p);
  const titleEl=$('jObT'+leg+'_'+p),srcEl=$('jObS'+leg+'_'+p),spreadEl=$('jObSp'+leg+'_'+p);
  if(!bidsEl)return;
  titleEl.textContent=data.instrument+' ('+data.exchange+')';
  srcEl.textContent=data.source==='websocket'?'WS':'REST';
  srcEl.className='ob-src '+(data.source==='websocket'?'ws':'rest');
  const bids=data.bids||[],asks=data.asks||[];
  const maxSz=Math.max(...bids.map(b=>b[1]),...asks.map(a=>a[1]),0.001);
  let bhtml='<div class="ob-side-hdr"><span>BID</span><span>SIZE</span></div>';
  for(const b of bids.slice(0,10)){const pct=Math.min(100,(b[1]/maxSz)*100);bhtml+='<div class="ob-row"><div class="ob-bar" style="width:'+pct+'%"></div><span class="ob-price">'+fmtP(b[0])+'</span><span class="ob-size">'+fmtS(b[1])+'</span></div>'}
  bidsEl.innerHTML=bhtml;
  let ahtml='<div class="ob-side-hdr"><span>ASK</span><span>SIZE</span></div>';
  for(const a of asks.slice(0,10)){const pct=Math.min(100,(a[1]/maxSz)*100);ahtml+='<div class="ob-row"><div class="ob-bar" style="width:'+pct+'%"></div><span class="ob-price">'+fmtP(a[0])+'</span><span class="ob-size">'+fmtS(a[1])+'</span></div>'}
  asksEl.innerHTML=ahtml;
  if(bids.length&&asks.length){spreadEl.textContent='Spread: $'+(asks[0][0]-bids[0][0]).toFixed(4)}
}

function renderAcct(p,all){
  const el=$('jAcct_'+p);if(!el)return;
  const exColors={grvt:'var(--accent)',extended:'var(--blue)'};
  let html='',totalEquity=0,totalPnl=0;
  for(const ex of all){
    const eq=parseFloat(ex.equity||0),av=parseFloat(ex.available||0),pnl=parseFloat(ex.unrealized_pnl||0);
    totalEquity+=eq;totalPnl+=pnl;
    const col=exColors[ex.exchange]||'var(--dim)',pnlCol=pnl>=0?'var(--green)':'var(--red)';
    html+='<div style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">';
    html+='<span style="font-size:11px;font-weight:700;color:'+col+';text-transform:uppercase">'+ex.exchange+'</span>';
    if(ex.error){html+='<span style="font-size:10px;color:var(--red)">'+ex.error+'</span></div></div>';continue}
    html+='<span style="font-size:10px;color:var(--dim)">$'+eq.toFixed(2)+'</span>';
    html+='<span style="font-size:10px;color:'+pnlCol+';margin-left:8px">PnL: '+(pnl>=0?'+':'')+pnl.toFixed(4)+'</span>';
    html+='</div>';
    const pos=ex.positions||[];
    if(pos.length){html+='<table style="font-size:10px"><thead><tr><th>Instrument</th><th>Side</th><th>Size</th><th>Entry</th></tr></thead><tbody>';
      pos.forEach(pp=>{const sz=parseFloat(pp.size);html+='<tr><td>'+pp.instrument+'</td><td class="'+(sz>0?'long':'short')+'">'+(sz>0?'LONG':'SHORT')+'</td><td>'+Math.abs(sz)+'</td><td>$'+parseFloat(pp.entry_price).toFixed(2)+'</td></tr>'});
      html+='</tbody></table>'}
    html+='</div>';
  }
  html='<div style="display:flex;gap:12px;margin-bottom:10px;padding:8px;background:var(--surface2);border-radius:6px;font-size:10px"><span>Equity: <b>$'+totalEquity.toFixed(2)+'</b></span><span>uPnL: <b style="color:'+(totalPnl>=0?'var(--green)':'var(--red)')+'">'+(totalPnl>=0?'+':'')+totalPnl.toFixed(4)+'</b></span></div>'+html;
  el.innerHTML=html;
}

function renderTradeLog(p,entries,jobId){
  const el=$('jTLog_'+p);if(!el)return;
  if(!entries.length){el.innerHTML='<div class="empty">No trades yet.</div>';return}
  const st2=(jobId&&jobState[jobId])||{};
  const legALabel=(st2.legAExchange||'Leg A').toUpperCase();
  const legBLabel=(st2.legBExchange||'Leg B').toUpperCase();
  let html='<table class="tlog"><thead><tr><th>Time</th><th>Action</th><th>'+legALabel+' Fill</th><th>'+legBLabel+' Fill</th><th>Exec Spread</th><th>Qty</th><th>Status</th></tr></thead><tbody>';
  for(const e of entries){
    const ts=new Date(e.timestamp).toLocaleTimeString();
    const ac=e.action==='ENTRY'?'act-entry':'act-exit';
    const fa=e.leg_a_fill_price!=null?'$'+parseFloat(e.leg_a_fill_price).toFixed(4):'—';
    const fb=e.leg_b_fill_price!=null?'$'+parseFloat(e.leg_b_fill_price).toFixed(4):'—';
    const ok=e.success?'<span class="ok">OK</span>':'<span class="fail">FAIL</span>';
    html+='<tr><td>'+ts+'</td><td class="'+ac+'">'+e.action+'</td><td class="fill-price">'+fa+'</td><td class="fill-price">'+fb+'</td><td>$'+Math.abs(parseFloat(e.spread_at_execution)).toFixed(4)+'</td><td>'+e.quantity+'</td><td>'+ok+'</td></tr>';
  }
  html+='</tbody></table>';
  el.innerHTML=html;
}

// ---- Job config actions ----
async function saveJobCfg(jobId){
  const p=jobId.replace(/[^a-zA-Z0-9]/g,'_');
  const hd=parseFloat($('jHD_'+p).value);
  const b={
    spread_entry_low:parseFloat($('jES_'+p).value),
    spread_exit_high:parseFloat($('jXS_'+p).value),
    max_exec_spread:parseFloat($('jME_'+p).value),
    quantity:parseFloat($('jQ_'+p).value),
    order_type:$('jOT_'+p).value,
    limit_offset_ticks:parseInt($('jLOT_'+p).value),
    hold_duration_h:isNaN(hd)?0:hd,
    min_exit_spread:parseFloat($('jMES_'+p).value),
  };
  const r=await f('/jobs/'+jobId+'/config',{method:'PUT',body:JSON.stringify(b)});
  if(r&&r.status==='ok')jLog(jobId,'info','Config saved');
  await tickJob(jobId);
}

async function toggleJobAT(jobId){
  const p=jobId.replace(/[^a-zA-Z0-9]/g,'_');
  const on=$('jAT_'+p).checked;
  await f('/jobs/'+jobId+'/config',{method:'PUT',body:JSON.stringify({auto_trade:on})});
  jLog(jobId,on?'success':'warn','Auto-trading '+(on?'ENABLED':'DISABLED'));
}
async function toggleJobSim(jobId){
  const p=jobId.replace(/[^a-zA-Z0-9]/g,'_');
  const on=$('jSim_'+p).checked;
  await f('/jobs/'+jobId+'/config',{method:'PUT',body:JSON.stringify({simulation_mode:on})});
  jLog(jobId,'info','Simulation '+(on?'ENABLED':'DISABLED'));
}

async function manualJobEntry(jobId){
  jLog(jobId,'info','Manual ENTRY triggered');
  const r=await f('/jobs/'+jobId+'/trigger',{method:'POST',body:JSON.stringify({action:'ENTRY'})});
  if(r){r.success?jLog(jobId,'success','ENTRY executed'):jLog(jobId,'error','ENTRY failed: '+r.error)}
  await tickJob(jobId);
}
async function manualJobExit(jobId){
  jLog(jobId,'info','Manual EXIT triggered');
  const r=await f('/jobs/'+jobId+'/trigger',{method:'POST',body:JSON.stringify({action:'EXIT'})});
  if(r){r.success?jLog(jobId,'success','EXIT executed'):jLog(jobId,'error','EXIT failed: '+r.error)}
  await tickJob(jobId);
}

function jLog(jobId,lv,msg){
  const st=jobState[jobId];if(!st)return;
  st.logs.unshift({t:new Date(),lv,msg});if(st.logs.length>100)st.logs.pop();
  const p=jobId.replace(/[^a-zA-Z0-9]/g,'_');
  const el=$('jLog_'+p);if(!el)return;
  el.innerHTML=st.logs.map(e=>'<div class="le '+e.lv+'"><span class="lt">'+e.t.toLocaleTimeString()+'</span><span>'+e.msg+'</span></div>').join('');
}

// ---- Global tick ----
async function tick(){
  await refreshJobList();
  if(activeJobId)await tickJob(activeJobId);
}

function startR(){if(rInt)clearInterval(rInt);rInt=setInterval(tick,rMs)}

async function init(){await tick();startR()}
init();
</script>
