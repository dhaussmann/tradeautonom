# Watchdog configuration
watchdog:
  suspect_threshold_seconds: 120      # 2 minutes
  retry_max_attempts: 10
  retry_base_delay_seconds: 10        # Exponential backoff starting at 10s
  retry_max_delay_seconds: 7200       # Max 2 hours
  reactivation_check_interval_hours: 24
  state_persistence_path: "/app/data/nado_watchdog_state.json"

# Discovery configuration
discovery:
  interval_hours: 24
  test_duration_seconds: 30
  nado_api_url: "https://gateway.prod.nado.xyz"
  
# WebSocket configuration
websocket:
  endpoint: "wss://gateway.prod.nado.xyz/v1/subscribe"
  subscription_delay_ms: 50           # Delay between subscribe messages
  connection_timeout_seconds: 5
  message_timeout_seconds: 30

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s %(name)s %(levelname)s %(message)s"
