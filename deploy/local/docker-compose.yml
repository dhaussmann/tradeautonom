services:
  tradeautonom:
    build:
      context: ../..
      dockerfile: deploy/local/Dockerfile
    container_name: tradeautonom
    restart: unless-stopped
    # init: true enables Docker's built-in tini as PID 1 (defense-in-depth;
    # the Dockerfile also sets its own tini ENTRYPOINT). Prevents HEALTHCHECK
    # zombie accumulation.
    init: true
    ports:
      - "${APP_PORT:-8002}:${APP_PORT:-8002}"
    env_file:
      - ../../.env
    environment:
      - APP_HOST=0.0.0.0
    volumes:
      # Code mounts — change code, restart container, no rebuild needed
      - ../../app:/app/app:ro
      - ../../static:/app/static:ro
      - ../../main.py:/app/main.py:ro
      # Persistent data (trade logs)
      - ../../data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${APP_PORT:-8002}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
