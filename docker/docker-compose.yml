version: "3.9"

services:
  tradeautonom:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tradeautonom
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - ../.env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8002
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
